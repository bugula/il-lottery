name: Scrape & Deploy

on:
  # illinoislotterynumbers.net (scraper source) typically posts ~1-2 hrs after each draw.
  # Each draw has two cron entries to cover EDT (UTC-4) and EST (UTC-5).
  # "early" runs seed the pre-draw dashboard; "catch-up" runs pull the actual result.
  schedule:
    # Midday draw ~1:35pm ET — early run (pre-draw dashboard update)
    - cron: '55 16 * * *'  # 12:55pm EDT / 11:55am EST
    - cron: '55 17 * * *'  #  1:55pm EDT / 12:55pm EST
    # Midday catch-up — source site should be updated by now
    - cron: '30 19 * * *'  #  3:30pm EDT (UTC-4)
    - cron: '30 20 * * *'  #  3:30pm EST (UTC-5)
    # Evening draw ~10:15pm ET — early run (pre-draw dashboard update)
    - cron: '35 1 * * *'   #  9:35pm EDT / 8:35pm EST
    - cron: '35 2 * * *'   # 10:35pm EDT / 9:35pm EST
    # Evening catch-up — source site should be updated by now
    - cron: '30 3 * * *'   # 11:30pm EDT (UTC-4)
    - cron: '30 4 * * *'   # 11:30pm EST (UTC-5)
  # Run on push to master (seeds data on first deploy)
  push:
    branches: [master]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      full_seed:
        description: 'Seed ALL history back to 2010? (yes/no)'
        required: false
        default: 'no'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: |
          # Auto-detect first run: if draws.json is empty, do a full seed
          DRAW_COUNT=$(python -c "import json; d=json.load(open('data/draws.json')); print(d.get('count',0))")
          if [ "${{ github.event.inputs.full_seed }}" = "yes" ] || [ "$DRAW_COUNT" = "0" ]; then
            echo "Running full historical seed (2010 → present)..."
            python scripts/scrape.py --all
          else
            echo "Running incremental update (current + previous year)..."
            python scripts/scrape.py
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/draws.json
          git diff --staged --quiet || git commit -m "data: update lottery draws $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Prepare Pages output
        run: |
          mkdir -p _site
          cp src/index.html _site/index.html
          cp data/draws.json _site/draws.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
